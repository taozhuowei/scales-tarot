# Gitleaks configuration — secret-scanning rules.
#
# Strategy: extend the upstream default rule set (AWS keys, GitHub tokens,
# JWTs, private keys, generic high-entropy API keys, etc) and layer our
# own allowlist on top so legitimate fixtures and reports do not trigger.
#
# Reference: https://github.com/gitleaks/gitleaks#configuration
#
# When adding a real exception, prefer narrowing by `paths` or `regexes`
# over broad commit/file allows. Every entry must have a comment explaining
# why the match is safe.

title = "scales-tarot gitleaks config"

# Pull in every default rule shipped with the gitleaks binary (one-line
# extension). Custom rules below add to this base; do not redefine the
# defaults inline or they drift from upstream.
[extend]
useDefault = true

[allowlist]
description = "Project-wide allowlist for non-secret matches"

# Paths excluded entirely. These are either generated artifacts (no
# untrusted content) or documentation directories that may contain
# illustrative tokens.
paths = [
  '''(^|/)node_modules/''',
  '''(^|/)dist/''',
  '''(^|/)app/dist/''',
  '''(^|/)server/dist/''',
  '''(^|/)reports/''',
  '''(^|/)playwright-report/''',
  '''(^|/)test/playwright-report/''',
  '''(^|/)package-lock\.json$''',
  # Example env files only document variable names, never real values.
  '''(^|/)\.env\.example$''',
  '''(^|/)\.env\.production\.example$''',
]

# Documented placeholders that show up in our codebase as obvious
# non-secrets (sample tokens, RFC examples, etc). Keep this list short;
# every entry must be a literal placeholder, never a redacted real value.
regexes = [
  # AWS canonical example key from AWS docs / RFC examples.
  '''AKIAIOSFODNN7EXAMPLE''',
  # Stripe public test key prefix used in API docs.
  '''pk_test_[A-Za-z0-9]{1,40}''',
  # Generic placeholder strings we use in fixtures / docs.
  '''(?i)your[_-](api[_-])?key[_-]here''',
  '''(?i)dummy[_-]secret''',
]
