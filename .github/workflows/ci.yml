name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Quality Gate
        # Direct invocation — `npm run quality` was removed when the public
        # script surface collapsed to dev/prod. CI calls the gate script
        # the same way pre-push does.
        run: node scripts/quality_gate.js full

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history is required for `gitleaks detect` to scan past
          # commits — shallow clones (default fetch-depth: 1) miss them.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Commit lint
        uses: wagoid/commitlint-github-action@v6
      - name: Gitleaks (full history)
        # Detects credentials anywhere in the repo's git history. Pre-commit
        # hooks only scan staged content; CI catches anything that was
        # force-pushed, amended, or merged in from a fork. `gitleaks git`
        # is the v8.30+ replacement for the deprecated `detect` command.
        run: node scripts/gitleaks_run.js git --no-banner --redact --verbose

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        # Must run BEFORE build, because scripts/build/prod.js' final step is
        # a Playwright smoke test against the freshly-built bundle. If the
        # browser binary is missing at that point, build crashes before the
        # explicit "Run E2E tests" step is even reached.
        # Mobile device emulation (iPhone 13 in test/playwright.config.ts)
        # uses chrome-headless-shell since Playwright 1.49+, which is a
        # separate binary from chromium. Install both explicitly.
        run: npx playwright install --with-deps chromium chromium-headless-shell

      - name: Build H5 + server
        # Skip the quality gate here — the `verify` job already ran it on
        # the same commit. --target h5,server keeps the e2e job lean (no
        # mp-weixin bundle that we don't actually exercise).
        run: node scripts/build/index.js --prod --target h5,server --skip-quality

      - name: Run E2E tests
        # Direct playwright invocation; we don't expose `npm run e2e` as
        # a public script anymore (the only legitimate caller is CI).
        run: npx playwright test --config=test/playwright.config.ts

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
